<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">SnapService Favicon</title>
  <desc id="desc">A browser window and camera lens representing website screenshots.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#bfdbfe" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <rect x="11" y="14" width="42" height="30" rx="5" fill="#0f172a" fill-opacity="0.35" />
  <rect x="14" y="18" width="36" height="22" rx="3" fill="#e2e8f0" fill-opacity="0.95" />
  <rect x="18" y="22" width="28" height="2.8" rx="1.4" fill="#94a3b8" />
  <rect x="18" y="27" width="18" height="2.8" rx="1.4" fill="#94a3b8" />
  <circle cx="32" cy="40" r="13" fill="#0f172a" />
  <circle cx="32" cy="40" r="8" fill="url(#lens)" />
  <circle cx="29.5" cy="36.8" r="2.1" fill="#ffffff" fill-opacity="0.95" />
</svg>
